name: E2E Smoke Test (Multi-Distro)

on:
  push:
    paths:
      - "scripts/**"
      - "container/**"
      - "systemd/**"
      - "lib/**"
      - "tests/**"
      - ".github/workflows/e2e-smoke.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "container/**"
      - "systemd/**"
      - "lib/**"
      - "tests/**"
      - ".github/workflows/e2e-smoke.yml"

jobs:
  smoke-test:
    name: "Smoke test (${{ matrix.distro }})"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    container: ${{ matrix.container && fromJSON(matrix.container) || '' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            runner: ubuntu-24.04
            container: ""
            pkg_install: |
              sudo apt-get update
              sudo apt-get install -y podman inotify-tools jq acl

          - distro: ubuntu-22.04
            runner: ubuntu-22.04
            container: ""
            pkg_install: |
              sudo apt-get update
              sudo apt-get install -y podman inotify-tools jq acl

          - distro: fedora-latest
            runner: ubuntu-24.04
            container: '{"image": "fedora:latest", "options": "--privileged -v /sys/fs/cgroup:/sys/fs/cgroup:rw"}'
            pkg_install: |
              dnf install -y podman inotify-tools jq acl procps-ng systemd curl

    steps:
      - uses: actions/checkout@v4

      # ── Fedora: start systemd ────────────────────────────────
      # GitHub Actions container jobs don't run systemd as PID 1.
      # For Fedora we need to bootstrap systemd inside the
      # privileged container so Quadlet and service management work.
      - name: "Setup: initialize systemd (Fedora container)"
        if: matrix.distro == 'fedora-latest'
        run: |
          # In a privileged container we can start systemd components
          # needed for Quadlet and service management.
          if [ "$(cat /proc/1/comm)" != "systemd" ]; then
            echo "systemd is not PID 1, starting manually..."
            /usr/lib/systemd/systemd --system &
            # Wait for systemd to be ready
            for i in $(seq 1 30); do
              if systemctl is-system-running 2>/dev/null | grep -qE 'running|degraded'; then
                echo "systemd is ready (attempt $i)"
                break
              fi
              sleep 1
            done
            systemctl is-system-running || true
          else
            echo "systemd is PID 1"
          fi

      # ── Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: |
          ${{ matrix.pkg_install }}

      # ── Verify prerequisites ─────────────────────────────────
      - name: Verify prerequisites
        run: |
          set -euo pipefail
          echo "--- Podman version ---"
          podman --version
          MAJOR=$(podman --version | grep -oP '\d+' | head -1)
          [[ "$MAJOR" -ge 4 ]] || { echo "FAIL: podman >= 4.0 required"; exit 1; }
          echo "--- systemd ---"
          systemctl --version | head -1
          echo "PASS: prerequisites"

      # ── Create dummy OpenCode config ─────────────────────────
      - name: Create dummy OpenCode config and auth
        run: |
          mkdir -p ~/.config/opencode ~/.local/share/opencode
          cat > ~/.config/opencode/opencode.json <<'EOF'
          {
            "$schema": "https://opencode.ai/config.json"
          }
          EOF
          cat > ~/.local/share/opencode/auth.json <<'EOF'
          {
            "provider": "dummy",
            "token": "ci-test-token"
          }
          EOF

      # ── Configure ────────────────────────────────────────────
      - name: "Run configure.sh"
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Projects" "$HOME/work"

          # Scripted input: user, home, paths, agent_user, host, port, install_dir
          printf '%s\n' \
            "$(whoami)" \
            "" \
            "$HOME/Projects,$HOME/work" \
            "" \
            "" \
            "" \
            "" \
          | sudo -E ./scripts/configure.sh

          CONFIG="$HOME/.config/contain/config.json"
          [[ -f "$CONFIG" ]] || { echo "FAIL: config.json not created"; exit 1; }
          echo "--- config.json ---"
          cat "$CONFIG"
          echo "PASS: configure.sh"

      # ── Setup ────────────────────────────────────────────────
      - name: "Run setup.sh"
        run: |
          echo "Y" | sudo -E ./scripts/setup.sh

      # ── Create test project directories ──────────────────────
      - name: "Setup: create group-writable project directories"
        run: |
          mkdir -p "$HOME/Projects/myproject" "$HOME/work/mywork"
          chmod 770 "$HOME/Projects/myproject" "$HOME/work/mywork"

      # ── Smoke 1: Container is running ────────────────────────
      - name: "Smoke: container is running"
        run: |
          set -euo pipefail
          echo "--- podman ps ---"
          sudo podman ps
          sudo podman ps --format '{{.Names}}' | grep -q 'contAIn'
          echo "PASS: container is running"

      # ── Smoke 2: Health check ────────────────────────────────
      - name: "Smoke: health check"
        run: |
          set -euo pipefail
          CONFIG="$HOME/.config/contain/config.json"
          PORT=$(jq -r '.port' "$CONFIG")
          HOST=$(jq -r '.host' "$CONFIG")

          echo "--- Waiting for health endpoint ---"
          for i in $(seq 1 30); do
            if curl -sf "http://${HOST}:${PORT}/global/health" > /dev/null 2>&1; then
              echo "Health check passed (attempt $i)"
              break
            fi
            sleep 2
          done
          curl -sf "http://${HOST}:${PORT}/global/health" || \
            { echo "FAIL: health endpoint not responding"; exit 1; }
          echo "PASS: health check"

      # ── Smoke 3: Agent user identity ─────────────────────────
      - name: "Smoke: agent user identity"
        run: |
          set -euo pipefail
          WHOAMI=$(sudo podman exec contAIn whoami)
          [[ "$WHOAMI" == "agent" ]] || \
            { echo "FAIL: expected agent, got $WHOAMI"; exit 1; }

          # Verify GID matches primary user's group
          PRIMARY_GID=$(id -g "$(whoami)")
          AGENT_GID=$(sudo podman exec contAIn id -g)
          [[ "$PRIMARY_GID" == "$AGENT_GID" ]] || \
            { echo "FAIL: GID mismatch primary=$PRIMARY_GID agent=$AGENT_GID"; exit 1; }
          echo "PASS: agent user identity"

      # ── Smoke 4: Permission model ───────────────────────────
      - name: "Smoke: basic permission model"
        run: |
          set -euo pipefail

          # Create readable file (group-readable)
          echo "readable" > "$HOME/Projects/myproject/readable.txt"
          chmod 640 "$HOME/Projects/myproject/readable.txt"

          # Create blocked file (no group access)
          echo "secret" > "$HOME/Projects/myproject/secret.txt"
          chmod 600 "$HOME/Projects/myproject/secret.txt"

          echo "--- Agent should read group-readable file ---"
          CONTENT=$(sudo podman exec contAIn \
            cat /workspace/Projects/myproject/readable.txt)
          [[ "$CONTENT" == "readable" ]] || \
            { echo "FAIL: could not read group-readable file"; exit 1; }

          echo "--- Agent should NOT read 600-mode file ---"
          if sudo podman exec contAIn \
            cat /workspace/Projects/myproject/secret.txt 2>/dev/null; then
            echo "FAIL: agent could read 600-mode file"
            exit 1
          fi
          echo "PASS: basic permission model"

      # ── Smoke 5: Systemd services ───────────────────────────
      - name: "Smoke: systemd services"
        run: |
          set -euo pipefail
          echo "--- contAIn.service ---"
          systemctl is-active contAIn.service || \
            { echo "FAIL: contAIn.service not active"; exit 1; }

          echo "--- contain-watcher.service ---"
          systemctl is-active contain-watcher.service || \
            { echo "FAIL: contain-watcher.service not active"; exit 1; }

          echo "--- contain-commit.timer ---"
          systemctl is-active contain-commit.timer || \
            { echo "FAIL: contain-commit.timer not active"; exit 1; }
          echo "PASS: systemd services"

      # ── Smoke 6: Host-path symlinks ─────────────────────────
      - name: "Smoke: host-path symlinks in container"
        run: |
          set -euo pipefail
          # The entrypoint creates symlinks from host paths to /workspace/
          sudo podman exec contAIn \
            readlink "$HOME/Projects" | grep -q '/workspace/Projects'
          sudo podman exec contAIn \
            readlink "$HOME/work" | grep -q '/workspace/work'
          echo "PASS: host-path symlinks"

      # ── Diagnostics on failure ──────────────────────────────
      - name: "Diagnostics (on failure)"
        if: failure()
        run: |
          echo "=== systemctl status contAIn ==="
          systemctl status contAIn.service || true
          echo ""
          echo "=== journalctl -u contAIn (last 50 lines) ==="
          journalctl -u contAIn -n 50 --no-pager || true
          echo ""
          echo "=== journalctl -u contain-watcher (last 20 lines) ==="
          journalctl -u contain-watcher -n 20 --no-pager || true
          echo ""
          echo "=== podman ps -a ==="
          sudo podman ps -a || true
          echo ""
          echo "=== podman logs contAIn (last 50 lines) ==="
          sudo podman logs --tail 50 contAIn || true
          echo ""
          echo "=== podman inspect contAIn ==="
          sudo podman inspect contAIn || true
