          OWNER=$(stat -c '%U' "$HOME/.local/share/opencode")
          MODE=$(stat -c '%a' "$HOME/.local/share/opencode")
          [[ "$OWNER" == "$USER" ]] || \
            { echo "FAIL: ~/.local/share/opencode owner=$OWNER expected=$USER"; exit 1; }
          [[ "$MODE" == "770" ]] || \
            { echo "FAIL: ~/.local/share/opencode mode=$MODE expected=770"; exit 1; }
          echo "    PASS: ~/.local/share/opencode owner=$OWNER mode=$MODE"

          echo "--- Verifying ~/.config/opencode was re-created ---"
          [[ -d "$HOME/.config/opencode" ]] || \
            { echo "FAIL: ~/.config/opencode not re-created"; exit 1; }
          OWNER=$(stat -c '%U' "$HOME/.config/opencode")
          MODE=$(stat -c '%a' "$HOME/.config/opencode")
          [[ "$OWNER" == "$USER" ]] || \
            { echo "FAIL: ~/.config/opencode owner=$OWNER expected=$USER"; exit 1; }
          [[ "$MODE" == "770" ]] || \
            { echo "FAIL: ~/.config/opencode mode=$MODE expected=770"; exit 1; }
          echo "    PASS: ~/.config/opencode owner=$OWNER mode=$MODE"

          echo ""
          echo "PASS: TUI handles missing OpenCode dirs"

      # ── 16b. Test TUI service check (Bug 2 regression) ──────
      - name: "Test: TUI service check uses systemctl (Bug 2)"
        run: |
          set -euo pipefail

          # Bug 2: the old TUI script used `podman ps` which only sees the
          # rootless container namespace.  The rootful container managed by
          # systemd/Quadlet is invisible to an unprivileged `podman ps`, so
          # the check would always report "not running".  The fix uses
          # `systemctl is-active` instead, which is readable by any user.
          # This test asserts the fix is present in the installed script.
          TARGET=$(readlink -f /usr/local/bin/contain-tui)

          echo "--- Asserting TUI source uses systemctl is-active (not podman ps) ---"
          grep -q "systemctl is-active" "$TARGET" || \
            { echo "FAIL: TUI does not use systemctl is-active (Bug 2 regression)"; exit 1; }
          grep -qv "podman ps.*contain" "$TARGET" || \
            { echo "FAIL: TUI still uses podman ps (Bug 2 regression)"; exit 1; }

          echo "PASS: TUI service check uses systemctl (Bug 2)"

