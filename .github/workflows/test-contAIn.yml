          PROJECT="$HOME/Projects/myproject"
          TEST_FILE="inotify_symlink_test"
          EXPECTED_GROUP="$(id -gn)"

          echo "--- Creating file via symlinked host path inside container ---"
          sudo podman exec --user agent contain touch "$HOME/Projects/myproject/${TEST_FILE}"

          echo "--- Waiting for watcher to process (polling up to 10s) ---"
          for i in $(seq 1 20); do
            OWNER=$(stat -c '%U' "$PROJECT/$TEST_FILE" 2>/dev/null) || true
            if [[ "$OWNER" == "$USER" ]]; then
              echo "    Watcher completed after ~$((i / 2))s"
              break
            fi
            sleep 0.5
          done

          FINAL_OWNER=$(stat -c '%U' "$PROJECT/$TEST_FILE")
          FINAL_GROUP=$(stat -c '%G' "$PROJECT/$TEST_FILE")
          echo "    owner=$FINAL_OWNER group=$FINAL_GROUP"

          [[ "$FINAL_OWNER" == "$USER" ]] || \
            { echo "FAIL: owner=$FINAL_OWNER, expected=$USER"; exit 1; }
          [[ "$FINAL_GROUP" == "$EXPECTED_GROUP" ]] || \
            { echo "FAIL: group=$FINAL_GROUP, expected=$EXPECTED_GROUP"; exit 1; }

          rm -f "$PROJECT/$TEST_FILE"
          echo ""
          echo "PASS: inotify watcher works through symlink"

      # ── Diagnostics on failure ─────────────────────────────
      - name: Collect diagnostics
        if: failure()
        run: |
          echo "============================================"
          echo "  DIAGNOSTICS"
          echo "============================================"

          echo ""
          echo "=== OS / Podman info ==="
          cat /etc/os-release | head -5
          podman --version
          podman info --format '{{.Host.OCIRuntime.Name}} {{.Host.OCIRuntime.Version}}' 2>/dev/null || true

          echo ""
          echo "=== Users and groups ==="
          id agent 2>&1 || echo "(agent user not found)"
          id -gn "$USER" 2>&1
          id "$USER" 2>&1

          echo ""
          echo "=== systemctl status ==="
          systemctl status contain.service --no-pager 2>&1 || true
          echo "---"
          systemctl status contain-watcher.service --no-pager 2>&1 || true
          echo "---"
          systemctl list-timers contain-commit --no-pager 2>&1 || true

          echo ""
          echo "=== podman ps ==="
          sudo podman ps -a 2>&1 || true

          echo ""
          echo "=== container logs ==="
          sudo podman logs contain 2>&1 | tail -50 || true

          echo ""
          echo "=== journal (contain) ==="
          journalctl -u contain --no-pager -n 30 2>&1 || true

          echo ""
          echo "=== journal (watcher) ==="
          journalctl -u contain-watcher --no-pager -n 30 2>&1 || true

          echo ""
          echo "=== generated quadlet ==="
          cat /etc/containers/systemd/contain.container 2>&1 || true

          echo ""
          echo "=== generated watcher service ==="
          cat /etc/systemd/system/contain-watcher.service 2>&1 || true

          echo ""
          echo "=== contain config.json ==="
          cat "$HOME/.config/contain/config.json" 2>&1 || true

          echo ""
          echo "=== contain opencode.json ==="
          cat "$HOME/.config/contain/opencode.json" 2>&1 || true

          echo ""
          echo "=== project directory ==="
          ls -la "$HOME/Projects/" 2>&1 || true

          echo ""
          echo "=== podman images ==="
          sudo podman images 2>&1 || true
