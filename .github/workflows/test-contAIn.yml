          # On the non-Nix path the guard lives in setup.sh step 4, so we verify
          # that re-running setup.sh re-creates everything correctly.
          sudo rm -rf "$HOME/.local/share/opencode" "$HOME/.config/opencode"

          echo "--- Verifying dirs are gone ---"
          [[ ! -d "$HOME/.local/share/opencode" ]] || \
            { echo "FAIL: expected ~/.local/share/opencode to be absent"; exit 1; }
          [[ ! -d "$HOME/.config/opencode" ]] || \
            { echo "FAIL: expected ~/.config/opencode to be absent"; exit 1; }
          echo "    Dirs confirmed absent"

          echo "--- Re-running setup.sh (should re-create the missing dirs) ---"
          echo "Y" | sudo -E ./scripts/setup.sh

          echo "--- Verifying ~/.local/share/opencode was re-created ---"
          [[ -d "$HOME/.local/share/opencode" ]] || \
